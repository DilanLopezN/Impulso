services:
  postgres:
    image: postgres:17-alpine
    container_name: impulso-postgres
    environment:
      POSTGRES_USER: impulso
      POSTGRES_PASSWORD: impulso
      POSTGRES_DB: impulso
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U impulso -d impulso"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: impulso-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
