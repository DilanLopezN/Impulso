services:
  postgres:
    image: postgres:17-alpine
    container_name: impulso-postgres
    environment:
      POSTGRES_USER: impulso
      POSTGRES_PASSWORD: impulso
      POSTGRES_DB: impulso
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U impulso -d impulso"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: impulso-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgvector:
    image: pgvector/pgvector:pg17
    container_name: impulso-pgvector
    environment:
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge
      POSTGRES_DB: knowledge
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ../knowledge/sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  pgvector_data:
