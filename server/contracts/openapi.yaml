openapi: 3.1.0
info:
  title: Impulso API
  version: 0.1.0
  description: |
    Contrato HTTP do Impulso. Este documento é a fonte única de verdade para
    clientes (mobile, futuras versões web/admin). Apenas os módulos já
    implementados no back-end aparecem aqui — novos endpoints são adicionados
    conforme cada módulo do `README_BACKEND.md` é entregue.

servers:
  - url: http://localhost:3000
    description: Desenvolvimento local

tags:
  - name: auth
    description: Cadastro, autenticação e gestão de sessão.
  - name: users
    description: Perfil do usuário autenticado.
  - name: sessions
    description: Gestão de sessões ativas por dispositivo.
  - name: health
    description: Probes de saúde.

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Serviço ativo
          content:
            application/json:
              schema:
                type: object
                required: [status, service, timestamp]
                properties:
                  status: { type: string, enum: [ok] }
                  service: { type: string, enum: [api] }
                  timestamp: { type: string, format: date-time }

  /auth/signup:
    post:
      tags: [auth]
      summary: Cria uma nova conta e abre uma sessão
      operationId: authSignup
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SignupRequest' }
      responses:
        '201':
          description: Conta criada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResult' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email já cadastrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/login:
    post:
      tags: [auth]
      summary: Autentica um usuário existente
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Autenticado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResult' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotaciona o refresh token e emite novo access token
      description: |
        O refresh token é de uso único. Reutilização revoga a sessão inteira.
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: Tokens renovados
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '401':
          description: Refresh token inválido, expirado ou reutilizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      tags: [auth]
      summary: Encerra a sessão associada a um refresh token
      operationId: authLogout
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LogoutRequest' }
      responses:
        '204':
          description: Sessão encerrada

  /auth/password/forgot:
    post:
      tags: [auth]
      summary: Solicita recuperação de senha (envia token por e-mail)
      description: |
        Sempre retorna 202 com `{status: "accepted"}`, mesmo quando o e-mail
        informado não existe — para não vazar a existência de contas.
        Em ambiente `development`, o token é registrado nos logs do servidor
        para permitir testes manuais sem SMTP.
      operationId: authForgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotPasswordRequest' }
      responses:
        '202':
          description: Solicitação aceita
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [accepted] }

  /auth/password/reset:
    post:
      tags: [auth]
      summary: Redefine a senha usando token de recuperação
      description: |
        Token é de uso único e curta duração (30 min). Após o reset bem
        sucedido, todas as sessões do usuário são revogadas.
      operationId: authResetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetPasswordRequest' }
      responses:
        '204':
          description: Senha atualizada
        '401':
          description: Token inválido, expirado ou já utilizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /sessions:
    get:
      tags: [sessions]
      summary: Lista as sessões ativas do usuário autenticado
      operationId: sessionsList
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de sessões ativas (a sessão atual marcada com `current=true`).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Session' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sessions/{id}:
    delete:
      tags: [sessions]
      summary: Revoga uma sessão específica do usuário autenticado
      operationId: sessionsRevokeOne
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Sessão revogada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Sessão não encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /sessions/others:
    delete:
      tags: [sessions]
      summary: Revoga todas as outras sessões (mantém a atual)
      operationId: sessionsRevokeOthers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Quantidade de sessões revogadas
          content:
            application/json:
              schema:
                type: object
                required: [revoked]
                properties:
                  revoked: { type: integer, minimum: 0 }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me:
    get:
      tags: [users]
      summary: Retorna o usuário autenticado
      operationId: usersMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil do usuário
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicUser' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [users]
      summary: Atualiza campos do perfil do usuário autenticado
      operationId: usersUpdate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200':
          description: Perfil atualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicUser' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [users]
      summary: Exclui a conta do usuário autenticado (LGPD)
      description: |
        Soft delete: marca `deletedAt`, anonimiza e-mail/displayName, invalida
        a senha e revoga todas as sessões. Exige confirmação por senha no
        corpo da requisição.
      operationId: usersDelete
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeleteAccountRequest' }
      responses:
        '204':
          description: Conta excluída
        '401':
          description: Token ausente/expirado ou senha incorreta
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /users/me/export:
    get:
      tags: [users]
      summary: Exporta todos os dados do usuário autenticado (LGPD)
      operationId: usersExport
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Snapshot dos dados pessoais
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserDataExport' }
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ValidationError:
      description: Erro de validação no corpo da requisição
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Token ausente, inválido ou expirado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      required: [statusCode, message]
      properties:
        statusCode: { type: integer }
        message:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        error: { type: string }

    SignupRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, minLength: 8, maxLength: 128 }
        displayName: { type: string, minLength: 1, maxLength: 80 }
        timezone:
          type: string
          description: IANA timezone identifier (ex. America/Sao_Paulo).
        deviceName: { type: string, maxLength: 120 }
        deviceId: { type: string, maxLength: 120 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, minLength: 1, maxLength: 128 }
        deviceName: { type: string, maxLength: 120 }
        deviceId: { type: string, maxLength: 120 }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, minLength: 16, maxLength: 512 }

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, minLength: 16, maxLength: 512 }

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 320 }

    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token: { type: string, minLength: 16, maxLength: 512 }
        password: { type: string, minLength: 8, maxLength: 128 }

    DeleteAccountRequest:
      type: object
      required: [password]
      properties:
        password: { type: string, minLength: 1, maxLength: 128 }

    Session:
      type: object
      required: [id, createdAt, lastSeenAt, current]
      properties:
        id: { type: string, format: uuid }
        deviceId: { type: string, nullable: true }
        deviceName: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
        ipAddress: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        lastSeenAt: { type: string, format: date-time }
        current:
          type: boolean
          description: Verdadeiro quando a sessão é a usada na requisição atual.

    UserDataExport:
      type: object
      required: [schemaVersion, generatedAt, user, sessions]
      properties:
        schemaVersion: { type: integer, enum: [1] }
        generatedAt: { type: string, format: date-time }
        user: { $ref: '#/components/schemas/PublicUser' }
        sessions:
          type: array
          items:
            type: object
            required: [id, createdAt, lastSeenAt]
            properties:
              id: { type: string, format: uuid }
              deviceId: { type: string, nullable: true }
              deviceName: { type: string, nullable: true }
              userAgent: { type: string, nullable: true }
              ipAddress: { type: string, nullable: true }
              createdAt: { type: string, format: date-time }
              lastSeenAt: { type: string, format: date-time }
              revokedAt: { type: string, format: date-time, nullable: true }

    UpdateUserRequest:
      type: object
      properties:
        displayName: { type: string, minLength: 1, maxLength: 80 }
        avatarUrl: { type: string, format: uri, maxLength: 1024 }
        timezone: { type: string }

    AuthTokens:
      type: object
      required:
        - accessToken
        - accessTokenExpiresAt
        - refreshToken
        - refreshTokenExpiresAt
      properties:
        accessToken: { type: string, description: 'JWT assinado com JWT_ACCESS_SECRET.' }
        accessTokenExpiresAt: { type: string, format: date-time }
        refreshToken:
          type: string
          description: |
            Token opaco de uso único (base64url). O servidor armazena apenas o
            hash SHA-256 e o invalida a cada rotação.
        refreshTokenExpiresAt: { type: string, format: date-time }

    PublicUser:
      type: object
      required:
        - id
        - email
        - displayName
        - timezone
        - emailVerified
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        avatarUrl: { type: string, nullable: true, format: uri }
        timezone: { type: string }
        emailVerified: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AuthResult:
      type: object
      required: [user, tokens]
      properties:
        user: { $ref: '#/components/schemas/PublicUser' }
        tokens: { $ref: '#/components/schemas/AuthTokens' }
