openapi: 3.1.0
info:
  title: Impulso API
  version: 0.1.0
  description: |
    Contrato HTTP do Impulso. Este documento é a fonte única de verdade para
    clientes (mobile, futuras versões web/admin). Apenas os módulos já
    implementados no back-end aparecem aqui — novos endpoints são adicionados
    conforme cada módulo do `README_BACKEND.md` é entregue.

servers:
  - url: http://localhost:3000
    description: Desenvolvimento local

tags:
  - name: auth
    description: Cadastro, autenticação e gestão de sessão.
  - name: users
    description: Perfil do usuário autenticado.
  - name: sessions
    description: Gestão de sessões ativas por dispositivo.
  - name: goals
    description: CRUD de metas (hábito/prazo/numérica/projeto) e marcos.
  - name: habits
    description: CRUD de hábitos, check-ins idempotentes e ajuste de histórico.
  - name: gamification
    description: XP, nível, ranking pessoal e conquistas.
  - name: health
    description: Probes de saúde.

paths:
  /health:
    get:
      tags: [health]
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Serviço ativo
          content:
            application/json:
              schema:
                type: object
                required: [status, service, timestamp]
                properties:
                  status: { type: string, enum: [ok] }
                  service: { type: string, enum: [api] }
                  timestamp: { type: string, format: date-time }

  /auth/signup:
    post:
      tags: [auth]
      summary: Cria uma nova conta e abre uma sessão
      operationId: authSignup
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SignupRequest' }
      responses:
        '201':
          description: Conta criada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResult' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          description: Email já cadastrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/login:
    post:
      tags: [auth]
      summary: Autentica um usuário existente
      operationId: authLogin
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Autenticado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResult' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/refresh:
    post:
      tags: [auth]
      summary: Rotaciona o refresh token e emite novo access token
      description: |
        O refresh token é de uso único. Reutilização revoga a sessão inteira.
      operationId: authRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: Tokens renovados
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthTokens' }
        '401':
          description: Refresh token inválido, expirado ou reutilizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /auth/logout:
    post:
      tags: [auth]
      summary: Encerra a sessão associada a um refresh token
      operationId: authLogout
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LogoutRequest' }
      responses:
        '204':
          description: Sessão encerrada

  /auth/password/forgot:
    post:
      tags: [auth]
      summary: Solicita recuperação de senha (envia token por e-mail)
      description: |
        Sempre retorna 202 com `{status: "accepted"}`, mesmo quando o e-mail
        informado não existe — para não vazar a existência de contas.
        Em ambiente `development`, o token é registrado nos logs do servidor
        para permitir testes manuais sem SMTP.
      operationId: authForgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ForgotPasswordRequest' }
      responses:
        '202':
          description: Solicitação aceita
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [accepted] }

  /auth/password/reset:
    post:
      tags: [auth]
      summary: Redefine a senha usando token de recuperação
      description: |
        Token é de uso único e curta duração (30 min). Após o reset bem
        sucedido, todas as sessões do usuário são revogadas.
      operationId: authResetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetPasswordRequest' }
      responses:
        '204':
          description: Senha atualizada
        '401':
          description: Token inválido, expirado ou já utilizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /sessions:
    get:
      tags: [sessions]
      summary: Lista as sessões ativas do usuário autenticado
      operationId: sessionsList
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Lista de sessões ativas (a sessão atual marcada com `current=true`).
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Session' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /sessions/{id}:
    delete:
      tags: [sessions]
      summary: Revoga uma sessão específica do usuário autenticado
      operationId: sessionsRevokeOne
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: Sessão revogada
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Sessão não encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /sessions/others:
    delete:
      tags: [sessions]
      summary: Revoga todas as outras sessões (mantém a atual)
      operationId: sessionsRevokeOthers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Quantidade de sessões revogadas
          content:
            application/json:
              schema:
                type: object
                required: [revoked]
                properties:
                  revoked: { type: integer, minimum: 0 }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /users/me:
    get:
      tags: [users]
      summary: Retorna o usuário autenticado
      operationId: usersMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Perfil do usuário
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicUser' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [users]
      summary: Atualiza campos do perfil do usuário autenticado
      operationId: usersUpdate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200':
          description: Perfil atualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PublicUser' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [users]
      summary: Exclui a conta do usuário autenticado (LGPD)
      description: |
        Soft delete: marca `deletedAt`, anonimiza e-mail/displayName, invalida
        a senha e revoga todas as sessões. Exige confirmação por senha no
        corpo da requisição.
      operationId: usersDelete
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeleteAccountRequest' }
      responses:
        '204':
          description: Conta excluída
        '401':
          description: Token ausente/expirado ou senha incorreta
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /users/me/export:
    get:
      tags: [users]
      summary: Exporta todos os dados do usuário autenticado (LGPD)
      operationId: usersExport
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Snapshot dos dados pessoais
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserDataExport' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /goals:
    get:
      tags: [goals]
      summary: Lista as metas do usuário autenticado
      operationId: goalsList
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: archived
          schema: { type: boolean }
          description: Quando `true`, retorna apenas arquivadas; `false`, apenas ativas; ausente retorna ambas.
        - in: query
          name: includeDeleted
          schema: { type: boolean }
          description: Inclui metas com `deletedAt` (soft-delete) para fins de histórico/auditoria.
      responses:
        '200':
          description: Lista de metas
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Goal' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [goals]
      summary: Cria uma nova meta
      description: |
        Tipos suportados — cada um com requisitos específicos:
        - `HABIT` exige `frequency`.
        - `DEADLINE` exige `deadline`.
        - `NUMERIC` exige `targetValue` (e opcionalmente `targetUnit`).
        - `PROJECT` aceita marcos no momento da criação.
      operationId: goalsCreate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateGoalRequest' }
      responses:
        '201':
          description: Meta criada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Goal' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /goals/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [goals]
      summary: Detalhe de uma meta
      operationId: goalsGet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Meta encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Goal' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Meta não encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    patch:
      tags: [goals]
      summary: Atualiza campos da meta (não editável quando arquivada)
      operationId: goalsUpdate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateGoalRequest' }
      responses:
        '200':
          description: Meta atualizada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Goal' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Meta não encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Meta arquivada (somente leitura)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [goals]
      summary: Soft-delete (mantém histórico)
      description: |
        Marca `deletedAt` no servidor; a meta deixa de aparecer nas listagens
        padrão mas pode ser recuperada via `?includeDeleted=true`. Esta regra
        existe para preservar referências históricas (XP ledger, conquistas,
        auditoria).
      operationId: goalsRemove
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Meta removida
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Meta não encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /goals/{id}/archive:
    post:
      tags: [goals]
      summary: Arquiva a meta (somente leitura)
      operationId: goalsArchive
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Meta arquivada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Goal' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Meta não encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /goals/{id}/unarchive:
    post:
      tags: [goals]
      summary: Remove o arquivamento da meta
      operationId: goalsUnarchive
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Meta desarquivada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Goal' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Meta não encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /goals/{id}/milestones:
    post:
      tags: [goals]
      summary: Adiciona um marco à meta
      operationId: goalsAddMilestone
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateMilestoneRequest' }
      responses:
        '201':
          description: Meta com marco adicionado (progresso recalculado)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Goal' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Meta não encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Meta arquivada (somente leitura)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /goals/{id}/milestones/{milestoneId}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: milestoneId
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [goals]
      summary: Atualiza um marco (e recalcula o progresso da meta)
      operationId: goalsUpdateMilestone
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateMilestoneRequest' }
      responses:
        '200':
          description: Meta atualizada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Goal' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Meta ou marco não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [goals]
      summary: Remove um marco da meta
      operationId: goalsRemoveMilestone
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Meta com marco removido
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Goal' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Meta ou marco não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /habits:
    get:
      tags: [habits]
      summary: Lista os hábitos do usuário
      operationId: habitsList
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: archived
          required: false
          schema: { type: boolean }
      responses:
        '200':
          description: Lista de hábitos com streak e progresso semanal calculados.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Habit' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [habits]
      summary: Cria um hábito
      operationId: habitsCreate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateHabitRequest' }
      responses:
        '201':
          description: Hábito criado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Habit' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /habits/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [habits]
      summary: Detalhe do hábito
      operationId: habitsGet
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Hábito
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Habit' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Hábito não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    patch:
      tags: [habits]
      summary: Atualiza um hábito (gera trilha de auditoria)
      operationId: habitsUpdate
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateHabitRequest' }
      responses:
        '200':
          description: Hábito atualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Habit' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Hábito não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Hábito arquivado (somente leitura)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [habits]
      summary: Soft-delete do hábito (preserva histórico)
      operationId: habitsDelete
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Hábito removido
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Hábito não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /habits/{id}/archive:
    post:
      tags: [habits]
      summary: Arquiva o hábito (somente leitura)
      operationId: habitsArchive
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Hábito arquivado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Habit' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Hábito não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /habits/{id}/unarchive:
    post:
      tags: [habits]
      summary: Remove o arquivamento do hábito
      operationId: habitsUnarchive
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Hábito desarquivado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Habit' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Hábito não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /habits/{id}/checkin:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [habits]
      summary: Marca conclusão do hábito (idempotente por dia)
      description: |
        Marca o hábito como concluído na data informada (ou hoje, no fuso do
        usuário). A operação é idempotente: chamadas repetidas para o mesmo
        `(habitId, date)` não geram XP em duplicidade — a chave de
        idempotência é `HABIT_CHECKIN:<habitId>:<date>` no `xp_ledger`.
      operationId: habitsCheckin
      security:
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCheckinRequest' }
      responses:
        '200':
          description: Hábito atualizado (com novo streak/progresso semanal)
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Habit' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Hábito não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
        '409':
          description: Hábito arquivado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }
    delete:
      tags: [habits]
      summary: Desfaz a conclusão do dia (compensa XP via ledger)
      operationId: habitsUndoCheckin
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: date
          required: false
          description: Data alvo (YYYY-MM-DD). Padrão é hoje, no fuso do usuário.
          schema: { type: string, pattern: '^\d{4}-\d{2}-\d{2}$' }
      responses:
        '200':
          description: Hábito atualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Habit' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Hábito não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /habits/{id}/checkin/adjust:
    post:
      tags: [habits]
      summary: Ajuste manual de histórico (com trilha de auditoria)
      description: |
        Permite criar ou remover a conclusão de um dia passado. Cada
        chamada gera uma linha em `habit_audit_log` com o motivo e a data
        de referência, preservando a rastreabilidade exigida pelo RF
        "ajuste manual de histórico".
      operationId: habitsAdjustCheckin
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdjustCheckinRequest' }
      responses:
        '200':
          description: Hábito atualizado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Habit' }
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Hábito não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /habits/{id}/checkins:
    get:
      tags: [habits]
      summary: Lista os check-ins de um hábito
      operationId: habitsListCheckins
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        '200':
          description: Lista de check-ins (mais recentes primeiro)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/HabitCheckin' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Hábito não encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /profile/summary:
    get:
      tags: [gamification]
      summary: Resumo de gamificação do usuário (XP, nível, streak)
      operationId: profileSummary
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Resumo
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProfileSummary' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /gamification/ledger:
    get:
      tags: [gamification]
      summary: Histórico paginado de eventos de pontuação
      operationId: gamificationLedger
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200':
          description: Página do ledger
          content:
            application/json:
              schema: { $ref: '#/components/schemas/XpLedgerPage' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /achievements:
    get:
      tags: [gamification]
      summary: Lista conquistas (com flag de desbloqueio)
      operationId: achievementsList
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Catálogo + status do usuário
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Achievement' }
        '401':
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    ValidationError:
      description: Erro de validação no corpo da requisição
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Token ausente, inválido ou expirado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      required: [statusCode, message]
      properties:
        statusCode: { type: integer }
        message:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        error: { type: string }

    SignupRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, minLength: 8, maxLength: 128 }
        displayName: { type: string, minLength: 1, maxLength: 80 }
        timezone:
          type: string
          description: IANA timezone identifier (ex. America/Sao_Paulo).
        deviceName: { type: string, maxLength: 120 }
        deviceId: { type: string, maxLength: 120 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 320 }
        password: { type: string, minLength: 1, maxLength: 128 }
        deviceName: { type: string, maxLength: 120 }
        deviceId: { type: string, maxLength: 120 }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, minLength: 16, maxLength: 512 }

    LogoutRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, minLength: 16, maxLength: 512 }

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 320 }

    ResetPasswordRequest:
      type: object
      required: [token, password]
      properties:
        token: { type: string, minLength: 16, maxLength: 512 }
        password: { type: string, minLength: 8, maxLength: 128 }

    DeleteAccountRequest:
      type: object
      required: [password]
      properties:
        password: { type: string, minLength: 1, maxLength: 128 }

    Session:
      type: object
      required: [id, createdAt, lastSeenAt, current]
      properties:
        id: { type: string, format: uuid }
        deviceId: { type: string, nullable: true }
        deviceName: { type: string, nullable: true }
        userAgent: { type: string, nullable: true }
        ipAddress: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        lastSeenAt: { type: string, format: date-time }
        current:
          type: boolean
          description: Verdadeiro quando a sessão é a usada na requisição atual.

    UserDataExport:
      type: object
      required: [schemaVersion, generatedAt, user, sessions, goals]
      properties:
        schemaVersion: { type: integer, enum: [1] }
        generatedAt: { type: string, format: date-time }
        user: { $ref: '#/components/schemas/PublicUser' }
        sessions:
          type: array
          items:
            type: object
            required: [id, createdAt, lastSeenAt]
            properties:
              id: { type: string, format: uuid }
              deviceId: { type: string, nullable: true }
              deviceName: { type: string, nullable: true }
              userAgent: { type: string, nullable: true }
              ipAddress: { type: string, nullable: true }
              createdAt: { type: string, format: date-time }
              lastSeenAt: { type: string, format: date-time }
              revokedAt: { type: string, format: date-time, nullable: true }
        goals:
          type: array
          items: { $ref: '#/components/schemas/GoalExport' }

    GoalType:
      type: string
      enum: [HABIT, DEADLINE, NUMERIC, PROJECT]

    GoalFrequency:
      type: string
      enum: [DAILY, WEEKLY, MONTHLY, CUSTOM]

    Milestone:
      type: object
      required: [id, title, done, xp, order, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        date: { type: string, format: date-time, nullable: true }
        done: { type: boolean }
        xp: { type: integer, minimum: 0 }
        order: { type: integer, minimum: 0 }
        completedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Goal:
      type: object
      required:
        - id
        - title
        - type
        - progress
        - createdAt
        - updatedAt
        - milestones
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string, nullable: true }
        category: { type: string, nullable: true }
        type: { $ref: '#/components/schemas/GoalType' }
        icon: { type: string, nullable: true }
        color: { type: string, nullable: true }
        deadline: { type: string, format: date-time, nullable: true }
        targetValue: { type: number, nullable: true }
        targetUnit: { type: string, nullable: true }
        frequency:
          allOf:
            - $ref: '#/components/schemas/GoalFrequency'
          nullable: true
        progress:
          type: number
          minimum: 0
          maximum: 1
          description: Fração de marcos concluídos (0..1).
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        milestones:
          type: array
          items: { $ref: '#/components/schemas/Milestone' }

    GoalExport:
      allOf:
        - $ref: '#/components/schemas/Goal'
        - type: object
          properties:
            deletedAt: { type: string, format: date-time, nullable: true }

    CreateGoalRequest:
      type: object
      required: [title, type]
      properties:
        title: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string, maxLength: 2000 }
        category: { type: string, maxLength: 60 }
        type: { $ref: '#/components/schemas/GoalType' }
        icon: { type: string, maxLength: 40 }
        color: { type: string, description: 'Cor hexadecimal (ex.: #F2947A).' }
        deadline: { type: string, format: date-time }
        targetValue: { type: number, minimum: 0 }
        targetUnit: { type: string, maxLength: 20 }
        frequency: { $ref: '#/components/schemas/GoalFrequency' }
        milestones:
          type: array
          maxItems: 50
          items:
            type: object
            required: [title]
            properties:
              title: { type: string, minLength: 1, maxLength: 120 }
              date: { type: string, format: date-time }
              xp: { type: integer, minimum: 0 }

    UpdateGoalRequest:
      type: object
      description: |
        Apenas os campos enviados são atualizados. Não é possível trocar `type`
        após a criação. Para campos opcionais, envie `null` para limpar.
      properties:
        title: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string, maxLength: 2000 }
        category: { type: string, maxLength: 60 }
        icon: { type: string, maxLength: 40 }
        color: { type: string }
        deadline: { type: string, format: date-time, nullable: true }
        targetValue: { type: number, minimum: 0, nullable: true }
        targetUnit: { type: string, maxLength: 20, nullable: true }
        frequency:
          allOf:
            - $ref: '#/components/schemas/GoalFrequency'
          nullable: true

    CreateMilestoneRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 120 }
        date: { type: string, format: date-time }
        xp: { type: integer, minimum: 0 }
        order: { type: integer, minimum: 0 }
        done: { type: boolean }

    UpdateMilestoneRequest:
      type: object
      properties:
        title: { type: string, minLength: 1, maxLength: 120 }
        date: { type: string, format: date-time, nullable: true }
        xp: { type: integer, minimum: 0 }
        order: { type: integer, minimum: 0 }
        done: { type: boolean }

    UpdateUserRequest:
      type: object
      properties:
        displayName: { type: string, minLength: 1, maxLength: 80 }
        avatarUrl: { type: string, format: uri, maxLength: 1024 }
        timezone: { type: string }

    AuthTokens:
      type: object
      required:
        - accessToken
        - accessTokenExpiresAt
        - refreshToken
        - refreshTokenExpiresAt
      properties:
        accessToken: { type: string, description: 'JWT assinado com JWT_ACCESS_SECRET.' }
        accessTokenExpiresAt: { type: string, format: date-time }
        refreshToken:
          type: string
          description: |
            Token opaco de uso único (base64url). O servidor armazena apenas o
            hash SHA-256 e o invalida a cada rotação.
        refreshTokenExpiresAt: { type: string, format: date-time }

    PublicUser:
      type: object
      required:
        - id
        - email
        - displayName
        - timezone
        - emailVerified
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        avatarUrl: { type: string, nullable: true, format: uri }
        timezone: { type: string }
        emailVerified: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AuthResult:
      type: object
      required: [user, tokens]
      properties:
        user: { $ref: '#/components/schemas/PublicUser' }
        tokens: { $ref: '#/components/schemas/AuthTokens' }

    HabitFrequency:
      type: string
      enum: [DAILY, WEEKLY, CUSTOM]

    Habit:
      type: object
      required:
        - id
        - title
        - frequency
        - weekdays
        - targetPerWeek
        - xpPerCheckin
        - todayDone
        - streak
        - weekDone
        - weekTarget
        - createdAt
        - updatedAt
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string, nullable: true }
        icon: { type: string, nullable: true }
        color: { type: string, nullable: true }
        frequency: { $ref: '#/components/schemas/HabitFrequency' }
        weekdays:
          type: array
          description: 'Dias da semana (0=Dom..6=Sáb) para hábitos CUSTOM.'
          items: { type: integer, minimum: 0, maximum: 6 }
        targetPerWeek:
          type: integer
          minimum: 1
          maximum: 7
          description: 'Meta de check-ins por semana (usado em frequência WEEKLY).'
        xpPerCheckin: { type: integer, minimum: 0 }
        archivedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        todayDone:
          type: boolean
          description: 'Conclusão da data atual (no fuso do usuário).'
        streak:
          type: integer
          minimum: 0
          description: 'Sequência atual computada a partir dos check-ins.'
        weekDone:
          type: integer
          minimum: 0
        weekTarget:
          type: integer
          minimum: 1

    HabitCheckin:
      type: object
      required: [id, habitId, date, xpAwarded, source, createdAt]
      properties:
        id: { type: string, format: uuid }
        habitId: { type: string, format: uuid }
        date:
          type: string
          format: date
          description: 'YYYY-MM-DD no fuso do usuário no momento da marcação.'
        note: { type: string, nullable: true }
        xpAwarded: { type: integer, minimum: 0 }
        source:
          type: string
          description: 'Origem da marcação: user | manual_adjustment | sync.'
        createdAt: { type: string, format: date-time }

    CreateHabitRequest:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string, maxLength: 2000 }
        icon: { type: string, maxLength: 40 }
        color: { type: string, description: 'Cor hexadecimal (ex.: #F2947A).' }
        frequency: { $ref: '#/components/schemas/HabitFrequency' }
        weekdays:
          type: array
          maxItems: 7
          items: { type: integer, minimum: 0, maximum: 6 }
        targetPerWeek: { type: integer, minimum: 1, maximum: 7 }
        xpPerCheckin: { type: integer, minimum: 0, maximum: 1000 }

    UpdateHabitRequest:
      type: object
      properties:
        title: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string, maxLength: 2000, nullable: true }
        icon: { type: string, maxLength: 40, nullable: true }
        color: { type: string, nullable: true }
        frequency: { $ref: '#/components/schemas/HabitFrequency' }
        weekdays:
          type: array
          maxItems: 7
          items: { type: integer, minimum: 0, maximum: 6 }
        targetPerWeek: { type: integer, minimum: 1, maximum: 7 }
        xpPerCheckin: { type: integer, minimum: 0, maximum: 1000 }

    CreateCheckinRequest:
      type: object
      properties:
        date:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: 'YYYY-MM-DD. Padrão: hoje no fuso do usuário.'
        note: { type: string, maxLength: 280 }

    AdjustCheckinRequest:
      type: object
      required: [date, done]
      properties:
        date:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
        done:
          type: boolean
          description: '`true` para marcar a data; `false` para remover.'
        reason: { type: string, maxLength: 280 }

    XpEventType:
      type: string
      enum:
        - HABIT_CHECKIN
        - HABIT_CHECKIN_REVERTED
        - MILESTONE_COMPLETED
        - MILESTONE_REVERTED
        - GOAL_COMPLETED
        - ACHIEVEMENT_UNLOCKED
        - MANUAL_ADJUSTMENT

    XpLedgerEntry:
      type: object
      required: [id, type, amount, occurredAt]
      properties:
        id: { type: string, format: uuid }
        type: { $ref: '#/components/schemas/XpEventType' }
        amount:
          type: integer
          description: 'Pode ser negativo (compensação por reversão).'
        sourceType: { type: string, nullable: true }
        sourceId: { type: string, nullable: true }
        metadata:
          type: object
          additionalProperties: true
          nullable: true
        occurredAt: { type: string, format: date-time }

    XpLedgerPage:
      type: object
      required: [items, nextCursor]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/XpLedgerEntry' }
        nextCursor:
          type: string
          nullable: true

    ProfileSummary:
      type: object
      required:
        - userId
        - totalXp
        - level
        - xpIntoLevel
        - xpToNext
        - longestStreak
        - achievementsUnlocked
        - updatedAt
      properties:
        userId: { type: string, format: uuid }
        totalXp: { type: integer, minimum: 0 }
        level: { type: integer, minimum: 1 }
        xpIntoLevel: { type: integer, minimum: 0 }
        xpToNext: { type: integer, minimum: 0 }
        longestStreak: { type: integer, minimum: 0 }
        achievementsUnlocked: { type: integer, minimum: 0 }
        updatedAt: { type: string, format: date-time }

    AchievementCategory:
      type: string
      enum: [HABITS, GOALS, STREAKS, XP, SPECIAL]

    Achievement:
      type: object
      required:
        - id
        - code
        - title
        - description
        - category
        - xpReward
        - unlocked
      properties:
        id: { type: string, format: uuid }
        code: { type: string }
        title: { type: string }
        description: { type: string }
        category: { $ref: '#/components/schemas/AchievementCategory' }
        icon: { type: string, nullable: true }
        xpReward: { type: integer, minimum: 0 }
        unlocked: { type: boolean }
        unlockedAt: { type: string, format: date-time, nullable: true }
